<!DOCTYPE html>
<html>
<head>
    <title>Register - CropPulse</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo {
            font-weight: 600;
            font-size: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .box {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1a5edb;
        }

        #msg {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }

        .link {
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }

        .link a {
            color: #2c7be5;
            text-decoration: none;
        }

        .nav-links a {
    margin-right: 15px;
    text-decoration: none;
    color: #555;
}

.register-btn {
    padding: 6px 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 5px;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.login-btn {
    padding: 6px 12px;
    background: black !important;
    color: white !important;
    border: none;
    border-radius: 5px;
}

.nav-center {
    display: flex;
    gap: 25px;
}

.nav-center a {
    text-decoration: none;
    color: #555;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
}

.nav-center a:hover {
    background: #f0f2f5;
}
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">CropPulse</div>

    <div class="nav-center">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
    </div>

    <div class="nav-right">
        <a href="/login.html">
            <button class="login-btn">Login</button>
        </a>

        <a href="/register.html">
            <button class="register-btn">Register</button>
        </a>
    </div>
</div>

<div class="container">
    <div class="box">
        <h2>Register</h2>

        <input type="text" placeholder="Name">
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">

        <button onclick="register()">Create Account</button>

        <p id="msg"></p>

        <div class="link">
            Already have an account? <a href="/login.html">Login</a>
        </div>
    </div>
</div>

<script>
function register() {
    document.getElementById("msg").innerText = "Account created";

    setTimeout(() => {
        window.location.href = "/login.html";
    }, 1000);
}
</script>

</body>
</html>
